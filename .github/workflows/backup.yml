name: Cloudflare Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  export-d1-to-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export D1 database
        run: |
          mkdir -p backups
          BACKUP_NAME="typeshift-$(date -u +%F-%H%M%S).sql"
          BACKUP_FILE="backups/${BACKUP_NAME}"
          npx wrangler d1 export typeshift-prod --config client/wrangler.jsonc --remote --output "${BACKUP_FILE}"
          npx wrangler r2 object put "typeshift-backups/${BACKUP_NAME}" --file "${BACKUP_FILE}"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup
          path: backups/*.sql
