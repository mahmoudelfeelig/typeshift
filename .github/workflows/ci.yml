name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTJS_ENV: test
      JWT_SESSION_SECRET: ci-secret-change-me-before-production-123456789
      NEXT_PUBLIC_SITE_NAME: TypeShift Station
      NEXT_PUBLIC_SITE_URL: https://ci.typeshift.example
      NEXT_PUBLIC_CONTROLLER_NAME: TypeShift CI Entity
      NEXT_PUBLIC_CONTACT_EMAIL: privacy-ci@typeshift.example
      NEXT_PUBLIC_CONTACT_ADDRESS: CI Address Placeholder
      NEXT_PUBLIC_SUPPORT_EMAIL: support-ci@typeshift.example
      NEXT_PUBLIC_DPO_EMAIL: dpo-ci@typeshift.example
      NEXT_PUBLIC_LEGAL_LAST_UPDATED: March 8, 2026
      NEXT_PUBLIC_SCORE_RETENTION_DAYS: "365"
      NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS: "30"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      NEXT_PUBLIC_SOCIAL_LIVE_ENABLED: "true"
      NEXT_PUBLIC_CLOUDFLARE_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build worker bundle
        run: npm run build
