name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy-cloudflare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_D1_DATABASE_ID: ${{ vars.CF_D1_DATABASE_ID }}
      CF_CACHE_KV_ID: ${{ vars.CF_CACHE_KV_ID }}
      CF_RATE_LIMIT_KV_ID: ${{ vars.CF_RATE_LIMIT_KV_ID }}
      NEXTJS_ENV: production
      JWT_SESSION_SECRET: build-time-placeholder-change-me
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_CONTROLLER_NAME: ${{ vars.NEXT_PUBLIC_CONTROLLER_NAME }}
      NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
      NEXT_PUBLIC_CONTACT_ADDRESS: ${{ vars.NEXT_PUBLIC_CONTACT_ADDRESS }}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${{ vars.NEXT_PUBLIC_SUPPORT_EMAIL }}
      NEXT_PUBLIC_DPO_EMAIL: ${{ vars.NEXT_PUBLIC_DPO_EMAIL }}
      NEXT_PUBLIC_LEGAL_LAST_UPDATED: ${{ vars.NEXT_PUBLIC_LEGAL_LAST_UPDATED }}
      NEXT_PUBLIC_SCORE_RETENTION_DAYS: ${{ vars.NEXT_PUBLIC_SCORE_RETENTION_DAYS }}
      NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS: ${{ vars.NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_ADMIN_HANDLES: ${{ vars.NEXT_PUBLIC_ADMIN_HANDLES }}
      NEXT_PUBLIC_SOCIAL_LIVE_ENABLED: "true"
      NEXT_PUBLIC_CLOUDFLARE_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate production Wrangler config
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const configPath = "client/wrangler.jsonc";
          const baseConfig = fs.existsSync(configPath)
            ? JSON.parse(fs.readFileSync(configPath, "utf8"))
            : {};

          function required(name, fallback) {
            const value = process.env[name];
            if (value) {
              return value;
            }
            if (fallback) {
              return fallback;
            }
            throw new Error(`Missing required GitHub Actions variable or secret: ${name}`);
          }

          function envOrBase(name, fallback) {
            const value = process.env[name];
            if (value) {
              return value;
            }
            if (fallback !== undefined && fallback !== null && fallback !== "") {
              return fallback;
            }
            return "";
          }

          function firstRouteHostname(config) {
            const route = Array.isArray(config.routes) ? config.routes[0] : undefined;
            if (route && typeof route.pattern === "string" && route.pattern.length > 0) {
              return route.pattern;
            }
            return undefined;
          }

          function firstBindingValue(list, key) {
            if (!Array.isArray(list)) {
              return undefined;
            }
            const item = list[0];
            if (!item || typeof item !== "object") {
              return undefined;
            }
            return item[key];
          }

          const baseVars = baseConfig.vars || {};
          const siteUrl =
            envOrBase("NEXT_PUBLIC_SITE_URL", baseVars.NEXT_PUBLIC_SITE_URL) ||
            (firstRouteHostname(baseConfig) ? `https://${firstRouteHostname(baseConfig)}` : "");

          if (!siteUrl) {
            throw new Error("Missing required GitHub Actions variable or secret: NEXT_PUBLIC_SITE_URL");
          }

          const hostname = new URL(siteUrl).hostname;
          const workerName = envOrBase("WORKER_NAME", baseConfig.name || "typeshift");
          const cacheKvId = required(
            "CF_CACHE_KV_ID",
            Array.isArray(baseConfig.kv_namespaces)
              ? baseConfig.kv_namespaces.find((entry) => entry.binding === "CACHE_KV")?.id
              : undefined,
          );
          const rateLimitKvId = required(
            "CF_RATE_LIMIT_KV_ID",
            Array.isArray(baseConfig.kv_namespaces)
              ? baseConfig.kv_namespaces.find((entry) => entry.binding === "RATE_LIMIT_KV")?.id
              : undefined,
          );
          const d1DatabaseId = required(
            "CF_D1_DATABASE_ID",
            Array.isArray(baseConfig.d1_databases)
              ? baseConfig.d1_databases.find((entry) => entry.binding === "DB")?.database_id
              : undefined,
          );
          const nextCacheBucket =
            Array.isArray(baseConfig.r2_buckets)
              ? baseConfig.r2_buckets.find((entry) => entry.binding === "NEXT_INC_CACHE_R2_BUCKET")
                  ?.bucket_name
              : undefined;
          const replayBucket =
            Array.isArray(baseConfig.r2_buckets)
              ? baseConfig.r2_buckets.find((entry) => entry.binding === "REPLAY_BUCKET")?.bucket_name
              : undefined;
          const backupBucket =
            Array.isArray(baseConfig.r2_buckets)
              ? baseConfig.r2_buckets.find((entry) => entry.binding === "BACKUP_BUCKET")?.bucket_name
              : undefined;

          const config = {
            "$schema": "../node_modules/wrangler/config-schema.json",
            name: workerName,
            main: ".open-next/worker.js",
            compatibility_date: baseConfig.compatibility_date || "2026-03-08",
            compatibility_flags:
              baseConfig.compatibility_flags || ["nodejs_compat", "global_fetch_strictly_public"],
            assets: baseConfig.assets || {
              directory: ".open-next/assets",
              binding: "ASSETS",
            },
            services: [
              {
                binding: "WORKER_SELF_REFERENCE",
                service: workerName,
              },
            ],
            vars: {
              NEXTJS_ENV: "production",
              NEXT_PUBLIC_SITE_NAME: envOrBase("NEXT_PUBLIC_SITE_NAME", baseVars.NEXT_PUBLIC_SITE_NAME || "TypeShift"),
              NEXT_PUBLIC_SITE_URL: siteUrl,
              NEXT_PUBLIC_CONTROLLER_NAME: envOrBase("NEXT_PUBLIC_CONTROLLER_NAME", baseVars.NEXT_PUBLIC_CONTROLLER_NAME || "TypeShift"),
              NEXT_PUBLIC_CONTACT_EMAIL: envOrBase("NEXT_PUBLIC_CONTACT_EMAIL", baseVars.NEXT_PUBLIC_CONTACT_EMAIL),
              NEXT_PUBLIC_CONTACT_ADDRESS: envOrBase("NEXT_PUBLIC_CONTACT_ADDRESS", baseVars.NEXT_PUBLIC_CONTACT_ADDRESS),
              NEXT_PUBLIC_SUPPORT_EMAIL: envOrBase("NEXT_PUBLIC_SUPPORT_EMAIL", baseVars.NEXT_PUBLIC_SUPPORT_EMAIL),
              NEXT_PUBLIC_DPO_EMAIL: envOrBase("NEXT_PUBLIC_DPO_EMAIL", baseVars.NEXT_PUBLIC_DPO_EMAIL),
              NEXT_PUBLIC_LEGAL_LAST_UPDATED: envOrBase("NEXT_PUBLIC_LEGAL_LAST_UPDATED", baseVars.NEXT_PUBLIC_LEGAL_LAST_UPDATED || "March 8, 2026"),
              NEXT_PUBLIC_SCORE_RETENTION_DAYS: envOrBase("NEXT_PUBLIC_SCORE_RETENTION_DAYS", baseVars.NEXT_PUBLIC_SCORE_RETENTION_DAYS || "365"),
              NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS: envOrBase("NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS", baseVars.NEXT_PUBLIC_TELEMETRY_RETENTION_DAYS || "30"),
              NEXT_PUBLIC_TURNSTILE_SITE_KEY: required("NEXT_PUBLIC_TURNSTILE_SITE_KEY", baseVars.NEXT_PUBLIC_TURNSTILE_SITE_KEY),
              NEXT_PUBLIC_ADMIN_HANDLES: envOrBase("NEXT_PUBLIC_ADMIN_HANDLES", baseVars.NEXT_PUBLIC_ADMIN_HANDLES),
              NEXT_PUBLIC_SOCIAL_LIVE_ENABLED: envOrBase("NEXT_PUBLIC_SOCIAL_LIVE_ENABLED", baseVars.NEXT_PUBLIC_SOCIAL_LIVE_ENABLED || "true"),
              NEXT_PUBLIC_CLOUDFLARE_ONLY: "true",
            },
            routes: [
              {
                pattern: hostname,
                custom_domain: true,
              },
            ],
            d1_databases: [
              {
                binding: "DB",
                database_name: "typeshift-prod",
                database_id: d1DatabaseId,
                remote: true,
              },
            ],
            kv_namespaces: [
              {
                binding: "CACHE_KV",
                id: cacheKvId,
              },
              {
                binding: "RATE_LIMIT_KV",
                id: rateLimitKvId,
                remote: true,
              },
            ],
            analytics_engine_datasets: baseConfig.analytics_engine_datasets || [
              {
                binding: "USAGE_ANALYTICS",
                dataset: "typeshift_usage",
              },
            ],
            observability: baseConfig.observability || {
              enabled: true,
              head_sampling_rate: 1,
              logs: {
                invocation_logs: true,
                head_sampling_rate: 1,
              },
            },
            r2_buckets: [
              {
                bucket_name: nextCacheBucket || "typeshift-next-cache",
                binding: "NEXT_INC_CACHE_R2_BUCKET",
                remote: true,
              },
              {
                bucket_name: replayBucket || "typeshift-replays",
                binding: "REPLAY_BUCKET",
                remote: true,
              },
              {
                bucket_name: backupBucket || "typeshift-backups",
                binding: "BACKUP_BUCKET",
                remote: true,
              },
            ],
          };

          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Run tests
        run: npm run test

      - name: Apply production D1 schema
        run: npx wrangler d1 execute typeshift-prod --config client/wrangler.jsonc --remote --file client/cloudflare/d1/migrations/0001_initial.sql --yes

      - name: Deploy to Cloudflare Workers
        run: npm run deploy:worker
