services:
  postgres:
    image: postgres:16-alpine
    container_name: typeshift-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: typeshift
    volumes:
      - typeshift_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d typeshift"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  typeshift_pgdata:
