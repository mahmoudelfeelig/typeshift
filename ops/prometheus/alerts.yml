groups:
  - name: typeshift-api
    rules:
      - alert: TypeShiftApiDown
        expr: up{job="typeshift-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "TypeShift API is down"
          description: "Prometheus cannot scrape the TypeShift API metrics endpoint."

      - alert: TypeShiftApi5xxBurst
        expr: sum(rate(typeshift_http_requests_total{status=~"5.."}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TypeShift API 5xx rate is elevated"
          description: "The API is returning 5xx responses above the configured threshold."

      - alert: TypeShiftApiLatencyHigh
        expr: avg(typeshift_http_request_duration_ms_avg) > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "TypeShift API latency is high"
          description: "Average observed request latency is above 400ms."
